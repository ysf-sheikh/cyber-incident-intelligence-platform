# ================================
# PROJECT PATH CONFIGURATION
# ================================
# Centralized file paths used across the project
# This avoids hardcoding paths in multiple scripts

paths:
  raw_data: "data/raw/cyber_incidents.csv"              # Original/raw dataset (input data)
  processed_data: "data/processed/cleaned_incidents.csv" # Cleaned dataset used for analysis & dashboard
  models_dir: "models/saved/"                          # Directory where trained ML models are stored
  figure_output: "reports/figures/"                    # Output folder for generated plots/visualizations


# ================================
# ANALYSIS PARAMETERS
# ================================
# Core settings used for data processing and ML model training
# Centralizing these makes experimentation and tuning easier

analysis_params:
  target_variable: "breach_severity"        # Column used as prediction target
  test_size: 0.2                            # Fraction of dataset used for testing (80/20 split)
  random_state: 42                          # Ensures reproducibility of results
  high_severity_threshold: 1000000         # Threshold defining "high severity" incidents (1M+ records exposed)


# ================================
# DASHBOARD CONFIGURATION
# ================================
# UI-related settings for Streamlit dashboard

dashboard:
  title: "Cyber Incident Intelligence Portal"  # Main dashboard title
  theme: "dark"                                # UI theme selection (dark mode preferred)